<div class="fundo">
  <div class="form-container">

    <!-- ===== Logo ===== -->
    <div class="logo-section">
      <div class="logo">

        <!-- Substitua o comentário abaixo pelo caminho real do ícone -->
        <!-- <img src="CAMINHO_DO_SEU_ICONE_AQUI" alt="Ícone Senai Notes" class="logo-icon" /> -->

        <span class="logo-text">Senai Notes</span>

        <div class="button-container">
          <button type="button" class="dark-toggle" (click)="toggleTheme()">
            <span class="icon">{{ isDarkMode ? '☀️' : '🌙' }}</span>
            <span class="label">{{ isDarkMode ? 'Light Mode' : 'Dark Mode' }}</span>
          </button>
        </div>
      </div>
    </div>

    <!-- ===== Título ===== -->
    <h1 class="form-title">Welcome to Note</h1>
    <p class="form-subtitle">Please log in to continue</p>

    <!-- ===== Mensagem de sucesso ===== -->
    <div *ngIf="sucessoErrorMessage" class="success-message">
      {{ sucessoErrorMessage }}
    </div>

    <!-- ===== Mensagem de credenciais incorretas ===== -->
    <div *ngIf="incorretoErrorMessage" class="error-message-global">
      {{ incorretoErrorMessage }}
    </div>

    <!-- ===== Formulário Reativo ===== -->
    <form [formGroup]="loginForm" (ngSubmit)="onLoginClick()">

      <!-- Campo de E-mail -->
      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          class="form-input"
          [class.error]="emailErrorMessage !== ''"
          placeholder="email@example.com"
        />
        <span *ngIf="emailErrorMessage" class="error-message">{{ emailErrorMessage }}</span>
      </div>

      <!-- Campo de Senha -->
<div class="form-group">
  <div class="form-label-row">
    <label for="password" class="form-label">Password</label>
    <a href="#" class="forgot-link">Forgot</a>
  </div>

  <div class="password-container">
    <input
      [type]="passwordVisible ? 'text' : 'password'"
      id="password"
      formControlName="password"
      class="form-input"
      [class.error]="passwordErrorMessage !== ''"
    />

    <!-- BOTÃO COM ÍCONE DINÂMICO -->
    <button type="button" class="password-toggle" (click)="togglePassword()">

      <!-- OLHO ABERTO -->
      <svg *ngIf="passwordVisible" width="18" height="18" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>

      <!-- OLHO FECHADO -->
      <svg *ngIf="!passwordVisible" width="18" height="18" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a21.77 21.77 0 0 1 5.06-5.94"/>
        <path d="M1 1l22 22"/>
      </svg>

    </button>
  </div>

  <span *ngIf="passwordErrorMessage" class="error-message">
    {{ passwordErrorMessage }}
  </span>
</div>
      <!-- Botão de Login -->
      <button type="submit" class="submit-button">Login</button>

    </form>

    <!-- ===== Link para cadastro ===== -->
    <div class="signup-link">
      No account yet? <a (click)="goToRegister()">Sign Up</a>
    </div>

  </div>
</div>
